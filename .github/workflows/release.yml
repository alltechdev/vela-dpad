name: Release

# On a v* tag push: build the (signed, if the keystore secret is set) release
# APK, version it from the tag, and attach it to the GitHub release. Mirrors
# Callguard/Arcana.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          KEYSTORE_B64: ${{ secrets.VELA_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/vela-release.jks"
            echo "Decoded keystore."
          else
            echo "No release keystore secret set — falling back to debug signing."
          fi

      - name: Derive version from tag
        id: version
        run: |
          # MAJOR*10000 + MINOR*100 + PATCH, so the code rises monotonically for
          # Obtainium — e.g. v1.2.3 -> versionName 1.2.3, versionCode 10203.
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          IFS='.' read -r MA MI PA <<< "$VER"
          MA=${MA:-0}; MI=${MI:-0}; PA=${PA:-0}
          VC=$((MA * 10000 + MI * 100 + PA))
          echo "name=$VER" >> "$GITHUB_OUTPUT"
          echo "code=$VC" >> "$GITHUB_OUTPUT"
          echo "Building versionName=$VER versionCode=$VC"

      - name: Build release APK
        env:
          VELA_KEYSTORE_PATH: ${{ runner.temp }}/vela-release.jks
          VELA_KEYSTORE_PASSWORD: ${{ secrets.VELA_KEYSTORE_PASSWORD }}
          VELA_KEY_ALIAS: ${{ secrets.VELA_KEY_ALIAS }}
        run: >
          ./gradlew :app:assembleRelease --no-daemon
          -PappVersionName=${{ steps.version.outputs.name }}
          -PappVersionCode=${{ steps.version.outputs.code }}

      - name: Stage APK with version-tagged name
        run: cp app/build/outputs/apk/release/app-release.apk "vela-maps-${{ github.ref_name }}.apk"

      - name: Attach APK to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          ASSET="vela-maps-${TAG}.apk"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" --title "$TAG" --generate-notes "$ASSET"
          fi

name: Promote weekly stable

# Every push to main publishes a PRERELEASE nightly (see ci.yml). Once a week this
# workflow promotes the newest nightly to the stable channel by flipping its
# prerelease flag and marking it Latest. Same tag, same signed APK, no rebuild:
# the stable release is a bits-identical nightly that has been out in the wild.
# Default Obtainium installs (and the in-app updater, which reads releases/latest)
# therefore move at a weekly cadence; nightly users opt in to prereleases.
#
# The promoted release's notes are regenerated to span everything since the
# PREVIOUS stable, so weekly users see the whole week's changelog, not just the
# last push's slice.

on:
  schedule:
    - cron: "0 16 * * 1" # Mondays 16:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency: promote-stable

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full tag history for the changelog span

      - name: Promote newest nightly to stable
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Newest prerelease and newest stable, by run number (the tag scheme is
          # v0.<minor>.<run> and run is globally monotonic, so numeric-sorting the
          # final component orders releases across minor bumps too).
          runof() { echo "${1##*.}"; }
          NIGHTLY="$(gh release list --limit 40 --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease)][0].tagName // empty')"
          STABLE="$(gh release list --limit 100 --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease | not)][0].tagName // empty')"
          if [ -z "$NIGHTLY" ]; then
            echo "No nightly to promote."
            exit 0
          fi
          if [ -n "$STABLE" ] && [ "$(runof "$NIGHTLY")" -le "$(runof "$STABLE")" ]; then
            echo "Newest nightly $NIGHTLY is not newer than stable $STABLE. Nothing to do."
            exit 0
          fi
          VER="${NIGHTLY#v}"
          # Regenerate the notes to cover the whole span since the previous stable.
          if [ -n "$STABLE" ]; then
            LOG="$(git log --no-merges --pretty=format:'- %s' "${STABLE}..${NIGHTLY}")"
            COMPARE="**Full changelog:** https://github.com/${GITHUB_REPOSITORY}/compare/${STABLE}...${NIGHTLY}"
          else
            LOG="$(git log --no-merges --pretty=format:'- %s' -n 30 "$NIGHTLY")"
            COMPARE=""
          fi
          [ -z "$LOG" ] && LOG="- Maintenance and internal changes"
          NOTES="$(printf 'What'\''s changed in %s\n\n%s\n\n%s\n' "$VER" "$LOG" "$COMPARE")"
          gh release edit "$NIGHTLY" \
            --prerelease=false \
            --latest \
            --notes "$NOTES"
          echo "Promoted $NIGHTLY to stable."

# Build one region's offline-routing CH graph and publish it to the `routing-graphs` release
# (+ merge it into routing-manifest.json). Run from the Actions tab → "Build offline routing graph"
# → enter a region. This is how the offline-routing catalog grows toward world coverage; each run
# adds/updates one region. (Big states/countries take a few minutes; well within the job limits.)
name: Build offline routing graph

on:
  workflow_dispatch:
    inputs:
      id:
        description: "Region id, lowercase, no spaces (e.g. oregon)"
        required: true
        type: string
      name:
        description: "Display name (e.g. Oregon (state))"
        required: true
        type: string
      pbf_url:
        description: "Geofabrik .osm.pbf URL"
        required: true
        type: string

permissions:
  contents: write # create/upload assets on the routing-graphs release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y osmium-tool jq zip
      - name: Build + publish region
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VELA_REPO: ${{ github.repository }}
        run: bash scripts/build-routing-region.sh "${{ inputs.id }}" "${{ inputs.name }}" "${{ inputs.pbf_url }}"
